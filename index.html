<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Monitoring PI KEKDA</title> 
  
  <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/e/ea/Logo_Bank_Indonesia.png">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #ffffff; 
      font-family: Arial, sans-serif;
    }

    /* Gaya Tampilan Loading Screen */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.8s ease-in-out; /* Efek memudar lebih halus */
    }

    #loading-screen img {
      width: 200px; 
      height: auto;
      margin-bottom: 20px;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #002d62; 
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div id="loading-screen">
    <img src="https://upload.wikimedia.org/wikipedia/commons/e/ea/Logo_Bank_Indonesia.png" alt="Logo Bank Indonesia">
    <div class="spinner"></div>
  </div>

  <iframe 
    id="my-iframe"
    src="https://script.google.com/macros/s/AKfycbziO0K9yol81ELtw4TKxvQEA2HhvzZrrfI5NHaJlDnBPWrFN2fl6VmROroHvwclbKjg/exec"
    width="100%"
    height="100%"
    allowfullscreen="true"
    allow="fullscreen"
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none; visibility: hidden;">
  </iframe>

  <script>
    const iframe = document.getElementById('my-iframe');
    const loadingScreen = document.getElementById('loading-screen');

    // Ketika jaringan mendeteksi iframe selesai dimuat
    iframe.onload = function() {
      // Menahan loading screen selama 2,5 detik agar proses render di background selesai sempurna
      setTimeout(() => {
        // Tampilkan iframe secara instan di belakang layar
        iframe.style.visibility = 'visible';
        
        // Pudarkan loading screen secara halus
        loadingScreen.style.opacity = '0';
        
        // Hapus total elemen loading screen setelah animasi pudar selesai
        setTimeout(() => {
          loadingScreen.style.display = 'none';
        }, 800);
        
      }, 2500); 
    };
  </script>

</body>
</html>
